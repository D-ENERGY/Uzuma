<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Army-Navy-Efab Jumong</title>
    <style>
        :root {
            --army-green: #228B22;
            --navy-blue: #000080;
            --gold: #B8860B;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #000;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            flex-direction: row;
        }

        .side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.5s ease;
            position: relative;
            padding: 40px 20px;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
        }

        .army {
            background: linear-gradient(rgba(34, 139, 34, 0.8), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?auto=format&fit=crop&w=1000');
            background-size: cover; background-position: center;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .navy {
            background: linear-gradient(rgba(0, 0, 128, 0.8), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1000');
            background-size: cover; background-position: center;
        }

        .logo-box {
            background: white;
            padding: 10px;
            border-radius: 50%;
            width: 180px; height: 180px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 4px solid var(--gold);
            animation: breathe 4s ease-in-out infinite;
        }

        .logo-box img { max-width: 90%; max-height: 90%; object-fit: contain; }

        h1 {
            color: white;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        p { color: #fff; font-size: 1rem; max-width: 320px; margin-bottom: 30px; line-height: 1.4; }

        .enter-btn {
            padding: 12px 40px;
            border: 2px solid white;
            color: white;
            background: transparent;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border-radius: 30px;
        }

        .side:hover .enter-btn { background: white; }
        .army:hover .enter-btn { color: var(--army-green); }
        .navy:hover .enter-btn { color: var(--navy-blue); }

        .center-badge {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: white;
            color: #111;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid var(--gold);
            white-space: nowrap;
        }

        footer {
            position: absolute;
            bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            text-align: center;
            padding: 15px 10px;
            font-size: 0.8rem;
            z-index: 20;
            box-sizing: border-box;
            border-top: 1px solid var(--gold);
        }

        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; }
            .side { height: 50vh; min-height: 420px; flex: none; }
            .logo-box { width: 140px; height: 140px; }
            .center-badge { display: none; }
            footer { position: relative; }
        }
    </style>
</head>
<body>

    <div class="center-badge">USUMA DISTRICT, ABUJA</div>

    <div class="container">
        <a href="greenhills.html" class="side army">
            <div class="logo-box">
                <img src="WhatsApp Image 2026-04-18 at 15.30.21.jpeg" alt="Army Logo">
            </div>
            <h1>Greenhills City</h1>
            <p>Meeting your needs in Infrastructures and Buildings</p>
            <div class="enter-btn">Enter Site</div>
        </a>

        <a href="whitehills.html" class="side navy">
            <div class="logo-box">
                <img src="WhatsApp Image 2026-04-18 at 15.30.21 (1).jpeg" alt="Navy Logo">
            </div>
            <h1>Whitehills City</h1>
            <p>Meeting your needs in Infrastructures and Buildings</p>
            <div class="enter-btn">Enter Site</div>
        </a>
    </div>

    <footer>
        Plot 267, Katampe Ext, Abuja | <strong>Army-Navy-Efab Jumong Limited</strong> | &copy; 2026
    </footer>

</body>
</html>
